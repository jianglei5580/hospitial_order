<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover, user-scalable=no">
  <title>厨师/配送员工作台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4A90D9; --primary-dark: #357ABD; --success: #52c41a;
      --danger: #FF4D4F; --warning: #faad14; --bg: #f5f7fa;
      --card-bg: #fff; --text: #333; --text-light: #999;
      --border: #E8E8E8; --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }
    .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px 16px 16px; text-align: center; position: relative; }
    .header h1 { font-size: 18px; }
    .header-back { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

    /* Login */
    .login-section { padding: 40px 20px; }
    .login-card { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); max-width: 400px; margin: 0 auto; }
    .login-card h2 { text-align: center; margin-bottom: 20px; font-size: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #555; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; transition: border .2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
    .role-select { display: flex; gap: 12px; margin-bottom: 20px; }
    .role-option { flex: 1; padding: 16px 12px; background: #f8f9fa; border: 2px solid transparent; border-radius: 12px; text-align: center; cursor: pointer; transition: all .2s; }
    .role-option.active { border-color: var(--primary); background: #e8f0fe; }
    .role-option .role-icon { font-size: 36px; display: block; margin-bottom: 6px; }
    .role-option .role-name { font-size: 15px; font-weight: 600; }
    .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-login:active { background: var(--primary-dark); }

    /* Workbench */
    .workbench-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px 16px 16px; display: flex; justify-content: space-between; align-items: center; }
    .workbench-header .title { font-size: 18px; font-weight: 600; }
    .workbench-header .user-info { font-size: 12px; opacity: .85; }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

    .stats-bar { display: flex; padding: 12px 16px; gap: 12px; }
    .stat-item { flex: 1; background: var(--card-bg); border-radius: 10px; padding: 12px; text-align: center; box-shadow: var(--shadow); }
    .stat-item .num { font-size: 24px; font-weight: 700; color: var(--primary); }
    .stat-item .label { font-size: 12px; color: var(--text-light); margin-top: 2px; }

    .section-title { padding: 12px 16px 8px; font-size: 15px; font-weight: 600; color: #555; }
    .order-list { padding: 0 16px 80px; }

    .work-card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .work-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .work-card-header .order-no { font-weight: 600; color: var(--primary); }
    .work-card-header .meal-tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #e8f0fe; color: var(--primary); }
    .work-card-items { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.8; }
    .work-card-items .item-line { display: flex; justify-content: space-between; }
    .work-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .work-card-footer .info { font-size: 12px; color: var(--text-light); }
    .work-card-footer .info .dest { color: var(--text); font-weight: 500; }
    .btn-action { padding: 8px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: white; }
    .btn-action.chef { background: var(--warning); }
    .btn-action.chef:active { background: #d48806; }
    .btn-action.courier { background: var(--success); }
    .btn-action.courier:active { background: #389e0d; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--card-bg); }
    .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.75); color: white; padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 999; display: none; }
    .toast.show { display: block; }

    .history-card { background: var(--card-bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
    .history-card .left { font-size: 13px; }
    .history-card .left .no { font-weight: 600; }
    .history-card .right { text-align: right; font-size: 12px; color: var(--text-light); }
    .history-card .right .price { font-size: 15px; font-weight: 600; color: var(--danger); }

    .sort-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--card-bg); border-bottom: 1px solid var(--border); }
    .sort-bar .sort-label { font-size: 12px; color: var(--text-light); }
    .sort-bar .sort-btns { display: flex; gap: 6px; }
    .sort-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: #fff; cursor: pointer; color: var(--text-light); }
    .sort-btn.active { border-color: var(--primary); color: var(--primary); background: #e8f0fe; font-weight: 600; }

    .ready-tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f6ffed; color: var(--success); border: 1px solid #b7eb8f; }
    .work-card-time { font-size: 11px; color: var(--text-light); margin-top: 4px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="page-login" class="page active">
  <div class="header"><h1>🏥 工作台登录</h1></div>
  <div class="login-section">
    <div class="login-card">
      <h2>选择您的角色</h2>
      <div class="role-select">
        <div class="role-option active" id="role-chef" onclick="selectRole('chef')">
          <span class="role-icon">👨‍🍳</span>
          <span class="role-name">厨师</span>
        </div>
        <div class="role-option" id="role-courier" onclick="selectRole('courier')">
          <span class="role-icon">🚴</span>
          <span class="role-name">配送员</span>
        </div>
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="login-phone" maxlength="11" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码">
      </div>
      <button class="btn-login" onclick="doLogin()">登 录</button>
    </div>
  </div>
</div>

<!-- Chef Workbench -->
<div id="page-chef" class="page">
  <div class="workbench-header">
    <div>
      <div class="title">👨‍🍳 厨师工作台</div>
      <div class="user-info" id="chef-user-info"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
  <div class="stats-bar" id="chef-stats"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchChefTab(this,'pending')">待制作</div>
    <div class="tab" onclick="switchChefTab(this,'ready')">已备好</div>
    <div class="tab" onclick="switchChefTab(this,'done')">今日已完成</div>
  </div>
  <div id="chef-sort-bar" class="sort-bar">
    <span class="sort-label">下单时间排序</span>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="setChefSort('asc', this)">最早优先</button>
      <button class="sort-btn" onclick="setChefSort('desc', this)">最新优先</button>
    </div>
  </div>
  <div id="chef-pending-list" class="order-list"></div>
  <div id="chef-ready-list" class="order-list" style="display:none"></div>
  <div id="chef-done-list" class="order-list" style="display:none"></div>
</div>

<!-- Courier Workbench -->
<div id="page-courier" class="page">
  <div class="workbench-header">
    <div>
      <div class="title">🚴 配送员工作台</div>
      <div class="user-info" id="courier-user-info"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
  <div class="stats-bar" id="courier-stats"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchCourierTab(this,'pending')">待配送</div>
    <div class="tab" onclick="switchCourierTab(this,'done')">今日已送达</div>
  </div>
  <div id="courier-pending-list" class="order-list"></div>
  <div id="courier-done-list" class="order-list" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = location.origin + '/api';
const mealNames = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
let currentUser = null;
let selectedRole = 'chef';

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function apiFetch(url, opts = {}) {
  opts.headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const res = await fetch(API_BASE + url, opts);
  return res.json();
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-chef').classList.toggle('active', role === 'chef');
  document.getElementById('role-courier').classList.toggle('active', role === 'courier');
}

async function doLogin() {
  const phone = document.getElementById('login-phone').value.trim();
  const password = document.getElementById('login-password').value;
  if (!phone || !password) return showToast('请填写完整信息');
  const res = await apiFetch('/staff/login', {
    method: 'POST',
    body: JSON.stringify({ phone, password, role: selectedRole }),
  });
  if (res.code !== 0) return showToast(res.msg || '登录失败');
  currentUser = res.data;
  localStorage.setItem('staff_user', JSON.stringify(currentUser));
  enterWorkbench();
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('staff_user');
  showPage('page-login');
}

function enterWorkbench() {
  if (currentUser.role === 'chef') {
    document.getElementById('chef-user-info').textContent = currentUser.name + '（' + currentUser.phone + '）';
    showPage('page-chef');
    loadChefOrders();
  } else {
    document.getElementById('courier-user-info').textContent = currentUser.name + '（' + currentUser.phone + '）';
    showPage('page-courier');
    loadCourierOrders();
  }
}

// ============ Chef ============
let chefTab = 'pending';
let chefSort = 'asc';
let chefPendingCache = [];
let chefReadyCount = 0;

function setChefSort(dir, el) {
  chefSort = dir;
  document.querySelectorAll('#chef-sort-bar .sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderChefPending();
}

function switchChefTab(el, tab) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  chefTab = tab;
  document.getElementById('chef-pending-list').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('chef-ready-list').style.display = tab === 'ready' ? 'block' : 'none';
  document.getElementById('chef-done-list').style.display = tab === 'done' ? 'block' : 'none';
  document.getElementById('chef-sort-bar').style.display = (tab === 'pending' || tab === 'ready') ? 'flex' : 'none';
  if (tab === 'ready') loadChefReadyOrders();
  if (tab === 'done') loadChefHistory();
}

async function loadChefOrders() {
  const [pendingRes, readyRes] = await Promise.all([
    apiFetch('/staff/chef/orders?chef_id=' + currentUser.id),
    apiFetch('/staff/chef/ready-orders?chef_id=' + currentUser.id),
  ]);
  chefPendingCache = pendingRes.data || [];
  chefReadyCount = (readyRes.data || []).length;

  document.getElementById('chef-stats').innerHTML = `
    <div class="stat-item"><div class="num">${chefPendingCache.length}</div><div class="label">待制作</div></div>
    <div class="stat-item"><div class="num" style="color:var(--success)">${chefReadyCount}</div><div class="label">已备好</div></div>`;

  renderChefPending();
}

function renderChefPending() {
  const orders = [...chefPendingCache];
  orders.sort((a, b) => {
    const ta = a.created_at || '', tb = b.created_at || '';
    return chefSort === 'asc' ? ta.localeCompare(tb) : tb.localeCompare(ta);
  });

  const container = document.getElementById('chef-pending-list');
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">✅</div><div>暂无待制作订单</div></div>';
    return;
  }
  container.innerHTML = orders.map(o => {
    const dest = (o.building || '') + ' ' + (o.patient_bed || '');
    const timeStr = o.created_at ? o.created_at.replace(/^\d{4}-/, '') : '';
    return `<div class="work-card">
      <div class="work-card-header">
        <span class="order-no">#${o.id}</span>
        <span class="meal-tag">${mealNames[o.meal_type] || o.meal_type}</span>
      </div>
      <div class="work-card-items">
        ${(o.items||[]).map(i => `<div class="item-line"><span>${i.dish_name} × ${i.quantity}</span></div>`).join('')}
      </div>
      <div class="work-card-footer">
        <div class="info">
          <div>${o.patient_name || '-'}</div>
          <div class="dest">📍 ${dest.trim() || '未设置'}</div>
          <div class="work-card-time">🕐 下单: ${timeStr}</div>
        </div>
        <button class="btn-action chef" onclick="markReady(${o.id})">可以配送</button>
      </div>
    </div>`;
  }).join('');
}

async function loadChefReadyOrders() {
  const res = await apiFetch('/staff/chef/ready-orders?chef_id=' + currentUser.id);
  const allOrders = res.data || [];
  const orders = [...allOrders];
  orders.sort((a, b) => {
    const ta = a.created_at || '', tb = b.created_at || '';
    return chefSort === 'asc' ? ta.localeCompare(tb) : tb.localeCompare(ta);
  });

  const container = document.getElementById('chef-ready-list');
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📦</div><div>暂无已备好的订单</div></div>';
    return;
  }
  container.innerHTML = orders.map(o => {
    const dest = (o.building || '') + ' ' + (o.patient_bed || '');
    const timeStr = o.created_at ? o.created_at.replace(/^\d{4}-/, '') : '';
    return `<div class="work-card">
      <div class="work-card-header">
        <span class="order-no">#${o.id}</span>
        <span class="ready-tag">已备好 · 待配送</span>
      </div>
      <div class="work-card-items">
        ${(o.items||[]).map(i => `<div class="item-line"><span>${i.dish_name} × ${i.quantity}</span></div>`).join('')}
      </div>
      <div class="work-card-footer">
        <div class="info">
          <div>${o.patient_name || '-'}</div>
          <div class="dest">📍 ${dest.trim() || '未设置'}</div>
          <div class="work-card-time">🕐 下单: ${timeStr}</div>
          ${o.courier_name ? `<div class="work-card-time">🚴 配送: ${o.courier_name}</div>` : ''}
        </div>
        <span class="meal-tag">${mealNames[o.meal_type] || o.meal_type}</span>
      </div>
    </div>`;
  }).join('');
}

async function loadChefHistory() {
  const res = await apiFetch('/staff/chef/history?chef_id=' + currentUser.id);
  const orders = res.data || [];
  const container = document.getElementById('chef-done-list');
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div><div>今日暂无已完成订单</div></div>';
    return;
  }
  container.innerHTML = '<div class="section-title">今日已完成（已送达/退款等）</div>' + orders.map(o => `
    <div class="history-card">
      <div class="left"><span class="no">#${o.id}</span> ${o.patient_name||''} ${mealNames[o.meal_type]||''}</div>
      <div class="right"><div class="price">¥${o.total_price}</div></div>
    </div>`).join('');
}

async function markReady(orderId) {
  if (!confirm('确认该订单所有菜品已准备完毕，可以配送？')) return;
  const res = await apiFetch('/staff/chef/ready', {
    method: 'POST',
    body: JSON.stringify({ order_id: orderId, chef_id: currentUser.id }),
  });
  if (res.code !== 0) return showToast(res.msg || '操作失败');
  showToast('已推送至配送员');
  loadChefOrders();
}

// ============ Courier ============
let courierTab = 'pending';

function switchCourierTab(el, tab) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  courierTab = tab;
  document.getElementById('courier-pending-list').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('courier-done-list').style.display = tab === 'done' ? 'block' : 'none';
  if (tab === 'done') loadCourierHistory();
}

async function loadCourierOrders() {
  const res = await apiFetch('/staff/courier/orders?courier_id=' + currentUser.id);
  const orders = res.data || [];
  document.getElementById('courier-stats').innerHTML = `
    <div class="stat-item"><div class="num">${orders.length}</div><div class="label">待配送</div></div>`;

  const container = document.getElementById('courier-pending-list');
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">✅</div><div>暂无待配送订单</div></div>';
    return;
  }
  container.innerHTML = orders.map(o => {
    const dest = (o.building || '') + ' ' + (o.patient_bed || '');
    return `<div class="work-card">
      <div class="work-card-header">
        <span class="order-no">#${o.id}</span>
        <span class="meal-tag">${mealNames[o.meal_type] || o.meal_type}</span>
      </div>
      <div class="work-card-items">
        ${(o.items||[]).map(i => `<div class="item-line"><span>${i.dish_name} × ${i.quantity}</span></div>`).join('')}
      </div>
      <div class="work-card-footer">
        <div class="info">
          <div>${o.patient_name || '-'} ${o.patient_phone ? '📞'+o.patient_phone : ''}</div>
          <div class="dest">📍 ${dest.trim() || '未设置'}</div>
        </div>
        <button class="btn-action courier" onclick="markDelivered(${o.id})">已送达</button>
      </div>
    </div>`;
  }).join('');
}

async function loadCourierHistory() {
  const res = await apiFetch('/staff/courier/history?courier_id=' + currentUser.id);
  const orders = res.data || [];
  const container = document.getElementById('courier-done-list');
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div><div>今日暂无已送达订单</div></div>';
    return;
  }
  container.innerHTML = '<div class="section-title">今日已送达</div>' + orders.map(o => `
    <div class="history-card">
      <div class="left"><span class="no">#${o.id}</span> ${o.patient_name||''} → ${o.building||''} ${o.patient_bed||''}</div>
      <div class="right"><div class="price">¥${o.total_price}</div><div>${o.delivered_at ? o.delivered_at.split(' ')[1] : ''}</div></div>
    </div>`).join('');
}

async function markDelivered(orderId) {
  if (!confirm('确认该订单已送达患者？')) return;
  const res = await apiFetch('/staff/courier/delivered', {
    method: 'POST',
    body: JSON.stringify({ order_id: orderId, courier_id: currentUser.id }),
  });
  if (res.code !== 0) return showToast(res.msg || '操作失败');
  showToast('已确认送达');
  loadCourierOrders();
}

// ============ Auto-refresh ============
setInterval(() => {
  if (!currentUser) return;
  if (currentUser.role === 'chef') {
    if (chefTab === 'pending') loadChefOrders();
    else if (chefTab === 'ready') { loadChefOrders(); loadChefReadyOrders(); }
  }
  if (currentUser.role === 'courier' && courierTab === 'pending') loadCourierOrders();
}, 15000);

// ============ Init ============
const saved = localStorage.getItem('staff_user');
if (saved) {
  try {
    currentUser = JSON.parse(saved);
    enterWorkbench();
  } catch(e) { localStorage.removeItem('staff_user'); }
}
</script>
</body>
</html>
